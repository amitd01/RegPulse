name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/regpulse-backend:$IMAGE_TAG backend/
          docker push $ECR_REGISTRY/regpulse-backend:$IMAGE_TAG

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/regpulse-frontend:$IMAGE_TAG frontend/
          docker push $ECR_REGISTRY/regpulse-frontend:$IMAGE_TAG

      - name: Deploy to ECS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Deploy to ECS with image tag: $IMAGE_TAG"
          echo "TODO: Update ECS task definitions and force new deployment"
          # aws ecs update-service --cluster regpulse --service backend --force-new-deployment
          # aws ecs update-service --cluster regpulse --service frontend --force-new-deployment
