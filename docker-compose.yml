version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: regpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regpulse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-regpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - regpulse-net

  redis:
    image: redis:7-alpine
    container_name: regpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - regpulse-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: regpulse-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-regpulse}:${POSTGRES_PASSWORD:-regpulse_dev}@postgres:5432/${POSTGRES_DB:-regpulse}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regpulse-net

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: regpulse-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-regpulse}:${POSTGRES_PASSWORD:-regpulse_dev}@postgres:5432/${POSTGRES_DB:-regpulse}
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regpulse-net

  celery-beat:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: regpulse-celery-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-regpulse}:${POSTGRES_PASSWORD:-regpulse_dev}@postgres:5432/${POSTGRES_DB:-regpulse}
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regpulse-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: regpulse-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - regpulse-net

volumes:
  postgres_data:
    driver: local

networks:
  regpulse-net:
    driver: bridge
