version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: regpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regpulse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-regpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./backend/migrations/002_sprint3_knowledge_graph.sql:/docker-entrypoint-initdb.d/002_sprint3_knowledge_graph.sql:ro
      - ./backend/migrations/003_sprint4_confidence.sql:/docker-entrypoint-initdb.d/003_sprint4_confidence.sql:ro
      - ./backend/migrations/004_sprint5.sql:/docker-entrypoint-initdb.d/004_sprint5.sql:ro
      - ./backend/migrations/005_sprint6_system_user.sql:/docker-entrypoint-initdb.d/005_sprint6_system_user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - regpulse-net

  redis:
    image: redis:7-alpine
    container_name: regpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - regpulse-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: regpulse-backend
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-regpulse}:${POSTGRES_PASSWORD:-regpulse_dev}@postgres:5432/${POSTGRES_DB:-regpulse}
      REDIS_URL: redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regpulse-net

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: regpulse-scraper
    restart: unless-stopped
    stop_grace_period: 15s
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q celery,scraper
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-regpulse}:${POSTGRES_PASSWORD:-regpulse_dev}@postgres:5432/${POSTGRES_DB:-regpulse}
      REDIS_URL: redis://redis:6379/1
      PYTHONPATH: /
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regpulse-net

  celery-beat:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: regpulse-celery-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-regpulse}:${POSTGRES_PASSWORD:-regpulse_dev}@postgres:5432/${POSTGRES_DB:-regpulse}
      REDIS_URL: redis://redis:6379/1
      PYTHONPATH: /
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regpulse-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: regpulse-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - regpulse-net

volumes:
  postgres_data:
    driver: local

networks:
  regpulse-net:
    driver: bridge
