# Cloud Build config for frontend — passes NEXT_PUBLIC_API_URL as a build arg
# so it's baked into the Next.js bundle.
# Run with: gcloud builds submit --config=frontend/cloudbuild.yaml frontend/

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_API_URL}
      - -t
      - ${_IMAGE}
      - .
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

images:
  - '${_IMAGE}'

substitutions:
  _API_URL: 'https://regpulse-backend-yvigu4ssea-el.a.run.app/api/v1'
  _IMAGE: 'asia-south1-docker.pkg.dev/regpulse-495309/regpulse/frontend:rc1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
