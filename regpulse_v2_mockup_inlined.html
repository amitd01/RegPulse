/* RegPulse — Terminal Modern tokens */
:root {
  /* LIGHT (default) — paper, ink, signal */
  --bg: #f6f5f1;         /* warm paper */
  --bg-1: #eeece4;
  --bg-2: #e6e3d8;

  --panel-2: #f1efe7;
  --line: #dedacb;
  --line-2: #c9c3ae;
  --ink: #131210;
  --ink-2: #2b2924;
  --ink-3: #5a574d;
  --ink-4: #8b8773;
  --ink-5: #b3ae9a;

  --signal: #c25a11;       /* amber signal */
  --signal-2: #d97515;
  --signal-bg: #f4e3cc;
  --signal-ink: #6e3405;

  --good: #2c6f3f;
  --good-bg: #d9e7d5;
  --warn: #a66500;
  --warn-bg: #f0e0b4;
  --bad:  #a22020;
  --bad-bg: #efd3c9;

  --accent-blue: #1c3a68;
  --accent-blue-bg: #dde5f0;

  --radius: 2px;
  --radius-2: 4px;
  --radius-card: 6px;

  --font-sans: "Inter Tight", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-serif: "Source Serif 4", "Source Serif Pro", "Georgia", serif;
  --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Consolas, monospace;

  --shadow-sm: 0 1px 0 rgba(0,0,0,.04);
  --shadow: 0 1px 0 rgba(0,0,0,.04), 0 4px 16px -4px rgba(20,18,10,.08);
  --shadow-lg: 0 30px 60px -20px rgba(20,18,10,.25), 0 10px 24px -10px rgba(20,18,10,.15);

  --grid: rgba(20,18,10,.06);
  --grid-strong: rgba(20,18,10,.12);
}

:root[data-theme="dark"] {
  --bg: #0d0e0f;
  --bg-1: #121315;
  --bg-2: #17191c;
  --panel: #121315;
  --panel-2: #1a1c20;
  --line: #26292e;
  --line-2: #393d44;
  --ink: #f3efe2;
  --ink-2: #d9d5c6;
  --ink-3: #9a968a;
  --ink-4: #6a685f;
  --ink-5: #44433d;

  --signal: #f0a24a;
  --signal-2: #f7b567;
  --signal-bg: #3a2410;
  --signal-ink: #f7c48a;

  --good: #6bd38a;
  --good-bg: #102616;
  --warn: #e9b75a;
  --warn-bg: #2a1f08;
  --bad: #ef7d6d;
  --bad-bg: #2a1411;

  --accent-blue: #7aa4de;
  --accent-blue-bg: #101a2a;

  --shadow: 0 1px 0 rgba(0,0,0,.4), 0 10px 30px -10px rgba(0,0,0,.6);
  --shadow-lg: 0 30px 60px -20px rgba(0,0,0,.8), 0 10px 24px -10px rgba(0,0,0,.6);

  --grid: rgba(255,255,255,.04);
  --grid-strong: rgba(255,255,255,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-feature-settings: "ss01","cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 14px;
  line-height: 1.45;
  letter-spacing: -0.005em;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* Utility */
.mono { font-family: var(--font-mono); font-feature-settings: "zero", "ss02"; }
.serif { font-family: var(--font-serif); }
.tnum { font-variant-numeric: tabular-nums; }
.up { text-transform: uppercase; letter-spacing: .08em; }

/* Grid lines background used by terminal panels */
.gridlines {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* Scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

/* Pulse animation */
@keyframes pulseDot {
  0% { box-shadow: 0 0 0 0 rgba(194,90,17,.7); }
  70% { box-shadow: 0 0 0 10px rgba(194,90,17,0); }
  100% { box-shadow: 0 0 0 0 rgba(194,90,17,0); }
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--signal);
  animation: pulseDot 1.8s infinite;
  display: inline-block;
  flex-shrink: 0;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes sparkle {
  0%, 100% { opacity: .35; }
  50% { opacity: 1; }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(8px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Tick ticker */
.ticker-track {
  display: flex; gap: 48px;
  animation: marquee 80s linear infinite;
  width: max-content;
}

/* Focus */
:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

/* Selection — readers will highlight answers */
::selection { background: var(--signal); color: #fff; }

/* Divider bar used everywhere */
.hr { border: 0; height: 1px; background: var(--line); }

/* Card / panel */
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
}
.panel-flat { background: var(--panel); border: 1px solid var(--line); }

/* Ticks (section headers) */
.tick {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 10.5px;
  color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase;
}
.tick::before {
  content: ""; width: 10px; height: 1px; background: var(--ink-3);
}

/* Pills */
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .04em;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--ink-2);
  border-radius: 2px;
  white-space: nowrap;
}
.pill.amber { background: var(--signal-bg); color: var(--signal-ink); border-color: transparent; }
.pill.good  { background: var(--good-bg);   color: var(--good);       border-color: transparent; }
.pill.warn  { background: var(--warn-bg);   color: var(--warn);       border-color: transparent; }
.pill.bad   { background: var(--bad-bg);    color: var(--bad);        border-color: transparent; }
.pill.blue  { background: var(--accent-blue-bg); color: var(--accent-blue); border-color: transparent; }
.pill.ghost { background: transparent; }

/* Button */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border: 1px solid var(--line-2);
  background: var(--panel);
  color: var(--ink);
  font-size: 12.5px;
  font-weight: 500;
  border-radius: 2px;
  transition: background .12s ease, border-color .12s ease, transform .06s;
  cursor: pointer;
}
.btn:hover { background: var(--panel-2); border-color: var(--ink-4); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.btn.primary:hover { background: var(--ink-2); }
.btn.accent {
  background: var(--signal); color: #fff; border-color: var(--signal);
}
.btn.accent:hover { background: var(--signal-2); border-color: var(--signal-2); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-3); }
.btn.ghost:hover { color: var(--ink); background: var(--panel-2); }
.btn.sm { padding: 4px 8px; font-size: 11px; }
.btn.icon { padding: 6px; }
.btn[disabled] { opacity: .5; cursor: not-allowed; }

/* Kbd */
kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 5px;
  border: 1px solid var(--line);
  border-bottom-width: 2px;
  background: var(--panel);
  color: var(--ink-3);
  border-radius: 3px;
}

/* Table */
.dtable { width: 100%; border-collapse: collapse; font-size: 12px; }
.dtable th {
  text-align: left; font-weight: 500;
  color: var(--ink-4);
  font-family: var(--font-mono);
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.dtable td {
  padding: 10px;
  border-bottom: 1px solid var(--line);
  color: var(--ink-2);
  vertical-align: top;
}
.dtable tr:hover td { background: var(--panel-2); }

/* Prose */
.prose { font-family: var(--font-serif); font-size: 16.5px; line-height: 1.65; color: var(--ink-2); }
.prose p { margin-bottom: 1em; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { color: var(--ink); font-weight: 600; }
.prose em { font-style: italic; }
.prose .dek {
  font-family: var(--font-serif);
  font-size: 22px;
  line-height: 1.3;
  color: var(--ink);
  font-weight: 400;
  margin-bottom: 1.2em;
  font-style: italic;
  letter-spacing: -0.01em;
  border-left: 2px solid var(--signal);
  padding-left: 16px;
}
.prose mark.annot {
  background: var(--signal-bg);
  color: var(--signal-ink);
  padding: 1px 0;
  border-bottom: 1px dashed var(--signal);
  cursor: pointer;
  transition: background .15s;
}
.prose mark.annot:hover { background: var(--signal); color: #fff; }

/* Input */
.input {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  border-radius: 2px;
  font-size: 13px;
}
.input:focus { outline: none; border-color: var(--signal); box-shadow: 0 0 0 3px rgba(194,90,17,.15); }
textarea.input { resize: vertical; line-height: 1.5; }

/* Checkbox/radio */
.checkbox {
  appearance: none;
  width: 14px; height: 14px;
  border: 1px solid var(--line-2);
  background: var(--panel);
  border-radius: 2px;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.checkbox:checked { background: var(--ink); border-color: var(--ink); }
.checkbox:checked::after {
  content: ""; position: absolute;
  left: 3px; top: 0px;
  width: 5px; height: 9px;
  border: solid var(--bg);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

/* Progress bar generic */
.bar { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; position: relative; }
.bar > span { display: block; height: 100%; background: var(--ink); }
.bar.amber > span { background: var(--signal); }
.bar.good > span { background: var(--good); }
.bar.warn > span { background: var(--warn); }
.bar.bad > span { background: var(--bad); }

/* Toast */
.toast-stack {
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--ink);
  color: var(--bg);
  padding: 10px 14px;
  font-size: 12.5px;
  border-radius: 3px;
  box-shadow: var(--shadow-lg);
  animation: toastIn .24s ease;
  display: flex; align-items: center; gap: 10px;
  min-width: 280px; max-width: 400px;
  border-left: 3px solid var(--signal);
}
.toast .tmono { font-family: var(--font-mono); font-size: 10.5px; color: var(--signal); }
</style>

  Bookmark:(p) => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 3h14v18l-7-5-7 5z"/></svg>),
  Grid:    (p) => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>),

  Pin:     (p) => (<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 2v8M8 10h8l-1 5H9zM12 15v7"/></svg>),
};

// ---------- Sparkline ----------
function Sparkline({ data, width = 100, height = 28, stroke = "var(--signal)", fill = "rgba(194,90,17,0.12)" }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const step = width / (data.length - 1);
  const points = data.map((v, i) => [i * step, height - ((v - min) / range) * height]);
  const path = points.map(([x, y], i) => (i === 0 ? `M${x},${y}` : `L${x},${y}`)).join(" ");
  const area = `${path} L${width},${height} L0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <path d={area} fill={fill} />
      <path d={path} stroke={stroke} strokeWidth="1.25" fill="none" />
    </svg>
  );
}

// ---------- Avatar ----------
function Avatar({ initials, size = 24, tone = "default" }) {
  const bg = tone === "signal" ? "var(--signal)" : "var(--ink-3)";
  const color = tone === "signal" ? "#fff" : "var(--bg)";
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: bg, color, fontFamily: "var(--font-mono)",
      fontSize: size * 0.4, fontWeight: 600,
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      letterSpacing: 0, flexShrink: 0,
    }}>{initials}</div>
  );
}

// ---------- Toast system (imperative) ----------
const ToastContext = React.createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = (t) => {
    const id = Math.random().toString(36).slice(2);
    const toast = { id, ...t };
    setToasts((prev) => [...prev, toast]);
    setTimeout(() => setToasts((prev) => prev.filter(x => x.id !== id)), 3800);
  };
  return (
    <ToastContext.Provider value={{ push }}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => (
          <div key={t.id} className="toast">
            <span className="tmono">{t.tag || "OK"}</span>
            <span>{t.text}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}
const useToast = () => React.useContext(ToastContext);

// Export
Object.assign(window, {
  cn, Pill, Tick, Btn, Kbd, Icon, Sparkline, Avatar, ToastProvider, useToast,
});
</script>

// --- Heatmap ---
function HeatmapPanel() {
  const h = RP_DATA.heatmap;
  const max = Math.max(...h.rows.flatMap(r => r.vals));

  const color = (v) => {
    if (v === 0) return "var(--bg-2)";
    const t = v / max;
    // interpolate from paper to signal
    return `color-mix(in oklab, var(--signal) ${Math.round(t * 85 + 10)}%, var(--bg-2))`;
  };

  return (
    <div className="panel" style={{ padding: "14px 16px" }}>
      <div className="tick" style={{ marginBottom: 12 }}>QUESTIONS BY DOMAIN · LAST 7 DAYS</div>
      <div style={{ display: "grid", gridTemplateColumns: "120px repeat(7, 1fr)", gap: 3, alignItems: "center" }}>
        <div />
        {h.cols.map(c => (
          <div key={c} className="mono up" style={{ fontSize: 9.5, color: "var(--ink-4)", textAlign: "center" }}>{c}</div>
        ))}
        {h.rows.map(r => (
          <React.Fragment key={r.name}>
            <div style={{ fontSize: 11.5, color: "var(--ink-2)" }}>{r.name}</div>
            {r.vals.map((v, i) => (
              <div key={i} title={`${v} questions`} style={{
                height: 22, background: color(v), borderRadius: 1.5,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "var(--font-mono)", fontSize: 10.5,
                color: v / max > 0.5 ? "#fff" : "var(--ink-3)",
                fontWeight: 500,
                transition: "transform .12s",
                cursor: "pointer",
              }}
              onMouseOver={e => e.currentTarget.style.transform = "scale(1.15)"}
              onMouseOut={e => e.currentTarget.style.transform = "scale(1)"}>
                {v || ""}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 14, fontSize: 10.5, color: "var(--ink-4)" }} className="mono">
        <span>LESS</span>
        {[0.1, 0.25, 0.5, 0.75, 1].map(t => (
          <div key={t} style={{
            width: 14, height: 10, borderRadius: 1.5,
            background: `color-mix(in oklab, var(--signal) ${Math.round(t * 85 + 10)}%, var(--bg-2))`
          }}/>
        ))}
        <span>MORE</span>
        <span style={{ flex: 1 }} />
        <span>62 QUESTIONS</span>
      </div>
    </div>
  );
}

function ExposurePanel({ onRoute }) {
  const items = RP_DATA.actionItems;
  const byTeam = items.reduce((acc, it) => {
    acc[it.team] = acc[it.team] || { total: 0, done: 0, overdue: 0, high: 0 };

    if (it.status === "done") acc[it.team].done++;
    if (it.priority === "high") acc[it.team].high++;
    return acc;
  }, {});
  const teams = Object.entries(byTeam).sort((a,b) => b[1].high - a[1].high);

  return (
    <div className="panel">
      <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 10 }}>

            <th style={{ width: 70, textAlign: "right" }}>High</th>
            <th style={{ width: 120 }}>Progress</th>
          </tr>
        </thead>
        <tbody>
          {teams.map(([name, s]) => (
            <tr key={name}>
              <td style={{ fontWeight: 500 }}>{name}</td>
              <td className="mono tnum" style={{ textAlign: "right" }}>{s.total - s.done}</td>

              <td>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div className="bar amber" style={{ flex: 1 }}><span style={{ width: `${(s.done/s.total)*100}%` }}/></div>

              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>

    </div>
  );

function AnnotSpan({ id, text, annots, setActive }) {
  const has = annots.some(a => a.id === id);
  return (
    <mark
      className="annot"
      onClick={() => setActive(id)}
      style={{ position: "relative" }}>
      {text}
      {has ? <sup className="mono" style={{ marginLeft: 2, fontSize: 9, color: "var(--signal)", fontWeight: 700 }}>§</sup> : null}
    </mark>
  );
}

function AnnotPopover({ annot, onClose }) {
  if (!annot) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 80, background: "rgba(0,0,0,0.2)" }}>
      <div
        onClick={e => e.stopPropagation()}
        style={{
          position: "absolute", top: "30%", left: "35%",

          borderRadius: 4, padding: 16,
        }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
          <Avatar initials={annot.by} size={22} tone="signal" />
          <div>
            <div style={{ fontSize: 12.5, fontWeight: 600 }}>{annot.by}</div>
            <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)" }}>{annot.when} ago · on “{annot.text}”</div>
          </div>
          <div style={{ flex: 1 }} />
          <Btn variant="ghost" icon onClick={onClose}><Icon.Close/></Btn>
        </div>
        <div className="serif" style={{ fontSize: 14, fontStyle: "italic", lineHeight: 1.5, color: "var(--ink-2)", borderLeft: "2px solid var(--signal)", paddingLeft: 10 }}>
          {annot.note}
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
          <Btn size="sm"><Icon.Plus /> Reply</Btn>
          <Btn variant="ghost" size="sm">Resolve</Btn>
        </div>
      </div>
    </div>
  );
}

function ConfBadge({ score }) {
  const pct = Math.round(score * 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "var(--ink-3)" }}>
      <span className="mono up">CONF</span>
      <span className="mono tnum" style={{ fontWeight: 600, color: "var(--ink)" }}>{pct}%</span>
      <div style={{ width: 40 }}>
        <div className="bar good"><span style={{ width: `${pct}%` }}/></div>
      </div>
    </div>
  );
}

function ConfidenceRadial({ score }) {
  const pct = Math.round(score * 100);
  const r = 32;
  const c = 2 * Math.PI * r;
  const off = c - (c * pct) / 100;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
      <svg width="84" height="84" viewBox="0 0 84 84" style={{ transform: "rotate(-90deg)" }}>
        <circle cx="42" cy="42" r={r} stroke="var(--line)" strokeWidth="6" fill="none" />
        <circle cx="42" cy="42" r={r} stroke="var(--signal)" strokeWidth="6" fill="none" strokeLinecap="butt"
                strokeDasharray={c} strokeDashoffset={off} />
      </svg>
      <div>
        <div className="tnum" style={{ fontSize: 28, fontWeight: 600, letterSpacing: "-0.02em", lineHeight: 1 }}>{pct}<span style={{ fontSize: 14, color: "var(--ink-4)" }}>%</span></div>
        <div className="mono up" style={{ fontSize: 10, color: "var(--ink-4)", marginTop: 4 }}>HIGH CONFIDENCE</div>
      </div>
    </div>
  );
}

function FeedbackForm({ thumb, onClose, onSubmit }) {
  const options = thumb === "down" ? [
    "Missing a relevant circular",
    "Misinterpreted a citation",
    "Risk level too low",
    "Risk level too high",
    "Actions not aligned with our structure",
    "Stale — superseded circular cited",
  ] : [
    "Exactly what I needed",
    "Cited the right sections",
    "Actions are actionable",
    "Confidence feels right",
  ];
  const [checked, setChecked] = useState([]);
  const [note, setNote] = useState("");
  const toggle = (o) => setChecked(c => c.includes(o) ? c.filter(x => x !== o) : [...c, o]);
  return (
    <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
      <div style={{ fontSize: 11.5, color: "var(--ink-3)", marginBottom: 8 }}>
        {thumb === "down" ? "What's wrong or missing?" : "What worked well?"}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10 }}>
        {options.map(o => (
          <label key={o} style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            padding: "4px 8px", fontSize: 11.5,
            border: `1px solid ${checked.includes(o) ? "var(--signal)" : "var(--line)"}`,
            background: checked.includes(o) ? "var(--signal-bg)" : "var(--bg)",
            borderRadius: 2, cursor: "pointer",
            color: checked.includes(o) ? "var(--signal-ink)" : "var(--ink-2)",
          }}>
            <input type="checkbox" checked={checked.includes(o)} onChange={() => toggle(o)} className="checkbox" />
            {o}
          </label>
        ))}
      </div>
      <textarea value={note} onChange={e => setNote(e.target.value)} className="input"
        placeholder="Optional: what should the brief have said?" style={{ minHeight: 60, fontSize: 12.5 }} />
      <div style={{ display: "flex", gap: 6, marginTop: 8, justifyContent: "flex-end" }}>
        <Btn variant="ghost" size="sm" onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" size="sm" onClick={onSubmit}>Send to review queue</Btn>
      </div>
    </div>
  );
}

function LearningModal({ question, note, setNote, onSave, onClose }) {
  const [title, setTitle] = useState("Tier-1 floor for UL NBFCs is 10%, not 9.5% — glide-path ends Q4 FY27.");

        width: 560, background: "var(--panel)",
        border: "1px solid var(--line-2)", boxShadow: "var(--shadow-lg)",
        borderRadius: 4, overflow: "hidden",
      }}>
        <div style={{ padding: "14px 18px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 10 }}>
          <Icon.Spark style={{ color: "var(--signal)" }} />
          <h3 style={{ fontSize: 14, fontWeight: 600 }}>Save as team learning</h3>
          <div style={{ flex: 1 }} />
          <Btn variant="ghost" icon onClick={onClose}><Icon.Close /></Btn>
        </div>
        <div style={{ padding: 18 }}>
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", marginBottom: 4, letterSpacing: ".08em" }}>SOURCE QUESTION</div>
          <div className="serif" style={{ fontSize: 14, fontStyle: "italic", color: "var(--ink-2)", marginBottom: 16, lineHeight: 1.4 }}>
            “{question}”
          </div>
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", marginBottom: 4, letterSpacing: ".08em" }}>LEARNING · ONE-LINE TAKEAWAY</div>
          <input className="input" value={title} onChange={e => setTitle(e.target.value)} style={{ marginBottom: 12 }} />
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", marginBottom: 4, letterSpacing: ".08em" }}>NOTES (OPTIONAL)</div>
          <textarea className="input" value={note} onChange={e => setNote(e.target.value)}
            placeholder="Context for the team — why this matters, what changed."
            style={{ minHeight: 72, marginBottom: 12 }} />
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", marginBottom: 6, letterSpacing: ".08em" }}>TAGS</div>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
            {tags.map(t => <Pill key={t} tone="amber">{t} <Icon.Close style={{ width: 9, height: 9, marginLeft: 4 }}/></Pill>)}
            <Pill tone="ghost">+ add</Pill>
          </div>
        </div>
        <div style={{ padding: "12px 18px", background: "var(--bg-1)", borderTop: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 10 }}>
          <label style={{ fontSize: 12, color: "var(--ink-3)", display: "flex", alignItems: "center", gap: 6 }}>
            <input type="checkbox" className="checkbox" defaultChecked /> Notify team (5 members)
          </label>
          <div style={{ flex: 1 }} />
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          <Btn variant="accent" onClick={onSave}><Icon.Spark /> Save learning</Btn>
        </div>
      </div>
    </div>
  );
}

function BriefFooter() {
  return (
    <div style={{ marginTop: 32, padding: "16px 0", borderTop: "1px solid var(--line)", fontSize: 11, color: "var(--ink-4)", lineHeight: 1.6 }}>
      <div className="mono up" style={{ marginBottom: 4 }}>DISCLAIMER</div>
      RegPulse is not a legal advisory service. Briefs are AI-generated from indexed RBI circulars and must be verified at rbi.org.in before action.
    </div>
  );
}

<script type="text/babel" data-presets="react">
// Main app — routing, theme, tweaks, command palette

const { useState: uState, useEffect: uEffect } = React;

function App() {
  const [route, setRoute] = uState(() => location.hash.slice(1) || localStorage.getItem("rp:route") || "dashboard");
  const [theme, setTheme] = uState(() => localStorage.getItem("rp:theme") || "light");
  const [tweaksOn, setTweaksOn] = uState(false);
  const [cmdOpen, setCmdOpen] = uState(false);

  uEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem("rp:theme", theme);
  }, [theme]);

  uEffect(() => {
    localStorage.setItem("rp:route", route);
    location.hash = route;
  }, [route]);

  uEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setCmdOpen(o => !o); }
      if (e.key === "Escape") setCmdOpen(false);
    };
    const c = () => setCmdOpen(o => !o);
    window.addEventListener("keydown", h);
    window.addEventListener("rp:cmd", c);
    return () => { window.removeEventListener("keydown", h); window.removeEventListener("rp:cmd", c); };
  }, []);

  // Tweaks protocol
  uEffect(() => {
    const handler = (e) => {
      const msg = e.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.type === "__activate_edit_mode") setTweaksOn(true);
      if (msg.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", handler);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch(_) {}
    return () => window.removeEventListener("message", handler);
  }, []);

  const Page = {
    dashboard: Dashboard, ask: Ask, updates: Updates, library: Library,
    actions: ActionItems, history: History, saved: Saved, learnings: Learnings,
    debate: Debate, upgrade: Upgrade, account: Account, admin: Admin,
  }[route] || Dashboard;

  return (
    <ToastProvider>
      <div style={{ display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden" }}>
        <TopBar onToggleTheme={() => setTheme(t => t === "dark" ? "light" : "dark")} theme={theme} onRoute={setRoute} />
        <Ticker />
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          <Sidebar current={route} onRoute={setRoute} />
          <main style={{ flex: 1, overflow: "hidden", background: "var(--bg)" }}>
            <div key={route} style={{ height: "100%", overflow: "auto", animation: "fadeIn .2s ease" }}>
              <Page onRoute={setRoute} />
            </div>
          </main>
        </div>
      </div>

      {cmdOpen ? <CommandPalette onClose={() => setCmdOpen(false)} onRoute={(r) => { setRoute(r); setCmdOpen(false); }} /> : null}

      {tweaksOn ? <TweaksPanel theme={theme} setTheme={setTheme} /> : null}
    </ToastProvider>
  );
}

function CommandPalette({ onClose, onRoute }) {
  const [q, setQ] = uState("");
  const items = [
    ...NAV.map(n => ({ ...n, group: "Navigate" })),
    { id: "ask", label: "Ask: Tier-1 impact of SBR revision", icon: Icon.Ask, group: "Recent asks" },
    { id: "ask", label: "Ask: PSL climate-adaptive sub-target", icon: Icon.Ask, group: "Recent asks" },
    { id: "library", label: "DOR.CAP.REC.22 · SBR Revision", icon: Icon.Book, group: "Circulars" },
    { id: "library", label: "DOR.AML.REC.18 · KYC Amendment", icon: Icon.Book, group: "Circulars" },
  ];
  const filtered = items.filter(i => q === "" || i.label.toLowerCase().includes(q.toLowerCase()));
  const groups = filtered.reduce((acc, it) => { (acc[it.group] = acc[it.group] || []).push(it); return acc; }, {});
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,.35)", display: "flex", justifyContent: "center", paddingTop: 120 }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 560, height: "fit-content", background: "var(--panel)", border: "1px solid var(--line-2)", borderRadius: 4, boxShadow: "var(--shadow-lg)", overflow: "hidden" }}>
        <div style={{ padding: 12, borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 10 }}>
          <Icon.Search style={{ color: "var(--ink-3)" }} />
          <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="Ask, search, or jump…"
            style={{ flex: 1, background: "transparent", border: "none", outline: "none", fontSize: 14 }} />
          <Kbd>ESC</Kbd>
        </div>
        <div style={{ maxHeight: 400, overflowY: "auto", padding: "6px 0" }}>
          {Object.entries(groups).map(([g, items]) => (
            <div key={g}>
              <div className="mono up" style={{ fontSize: 9.5, color: "var(--ink-4)", padding: "8px 14px 4px" }}>{g}</div>
              {items.map((it, i) => {
                const Ic = it.icon;
                return (
                  <div key={i} onClick={() => onRoute(it.id)} style={{
                    padding: "8px 14px", fontSize: 13, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 10,
                  }} onMouseOver={e => e.currentTarget.style.background = "var(--panel-2)"}
                     onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                    <Ic style={{ color: "var(--ink-4)" }} />
                    {it.label}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function TweaksPanel({ theme, setTheme }) {
  const [density, setDensity] = uState("compact");
  const [font, setFont] = uState("editorial");
  const [accent, setAccent] = uState("amber");
  uEffect(() => {
    const r = document.documentElement;
    const m = { amber: "#c25a11", emerald: "#12734f", crimson: "#a22020", cobalt: "#1c4ebc" };
    if (m[accent]) r.style.setProperty("--signal", m[accent]);
  }, [accent]);
  return (
    <div style={{
      position: "fixed", bottom: 20, right: 20, width: 260,
      background: "var(--panel)", border: "1px solid var(--line-2)",
      boxShadow: "var(--shadow-lg)", zIndex: 150, borderRadius: 4,
    }}>
      <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 8 }}>
        <Icon.Settings style={{ color: "var(--signal)" }} />
        <span style={{ fontWeight: 600, fontSize: 12.5 }}>Tweaks</span>
      </div>
      <div style={{ padding: 14, display: "flex", flexDirection: "column", gap: 14 }}>
        <TweakRow label="Theme" options={[["light","Light"],["dark","Dark"]]} value={theme} onChange={setTheme} />
        <TweakRow label="Accent" options={[["amber","Amber"],["emerald","Emerald"],["crimson","Crimson"],["cobalt","Cobalt"]]} value={accent} onChange={setAccent} />
        <TweakRow label="Density" options={[["compact","Compact"],["normal","Normal"]]} value={density} onChange={setDensity} />
        <TweakRow label="Answer style" options={[["editorial","Editorial"],["memo","Memo"]]} value={font} onChange={setFont} />
      </div>
    </div>
  );
}

function TweakRow({ label, options, value, onChange }) {
  return (
    <div>
      <div className="mono up" style={{ fontSize: 10, color: "var(--ink-4)", marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", gap: 4 }}>
        {options.map(([k, l]) => (
          <button key={k} onClick={() => onChange(k)} style={{
            flex: 1, fontSize: 11.5, padding: "5px 0",
            border: `1px solid ${value === k ? "var(--signal)" : "var(--line)"}`,
            background: value === k ? "var(--signal-bg)" : "var(--bg)",
            color: value === k ? "var(--signal-ink)" : "var(--ink-2)",
            borderRadius: 2, cursor: "pointer",
          }}>{l}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
